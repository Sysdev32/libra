# Global Interface Settings
timeout: 0
remember_last_entry: yes

# Branding & Colors (using the updated naming convention)
interface_branding: Custom OS Boot Menu
theme_main_background: 000000
theme_foreground: ffffff

# Wallpaper styling for modern Limine versions
wallpaper: boot():/limine/wallpaper.png
wallpaper_style: stretched

# Primary Entry (Custom OS)
/My Custom OS
    protocol: limine
    kernel_path: boot():/kernel.elf
    module_path: boot():/initramfs.cpio
    module_string: initramfs